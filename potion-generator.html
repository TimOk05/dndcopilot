<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор зелий DnD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            padding: 40px;
            background: #f8f9fa;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            padding: 40px;
        }

        .results h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }

        .potion-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s ease;
        }

        .potion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .potion-name {
            color: #2a5298;
            margin-bottom: 15px;
            font-size: 1.4rem;
            border-bottom: 2px solid #e1e5e9;
            padding-bottom: 10px;
        }

        .potion-details {
            margin-bottom: 15px;
        }

        .potion-details p {
            margin-bottom: 8px;
            color: #555;
        }

        .potion-details strong {
            color: #333;
        }

        .potion-description {
            color: #666;
            line-height: 1.6;
        }

        .rarity-common { color: #28a745; font-weight: 600; }
        .rarity-uncommon { color: #17a2b8; font-weight: 600; }
        .rarity-rare { color: #6f42c1; font-weight: 600; }
        .rarity-very-rare { color: #fd7e14; font-weight: 600; }
        .rarity-legendary { color: #dc3545; font-weight: 600; }
        
        /* Стили для редкости с правильными названиями */
        .rarity-Common { color: #28a745; font-weight: 600; }
        .rarity-Uncommon { color: #17a2b8; font-weight: 600; }
        .rarity-Rare { color: #6f42c1; font-weight: 600; }
        .rarity-Very-Rare { color: #fd7e14; font-weight: 600; }
        .rarity-Legendary { color: #dc3545; font-weight: 600; }
        
        /* Дополнительные варианты */
        .rarity-very-rare { color: #fd7e14; font-weight: 600; }
        .rarity-very-rare { color: #fd7e14; font-weight: 600; }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #f5c6cb;
            text-align: center;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }

        .stats {
            background: #e9ecef;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats p {
            color: #495057;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .results {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Генератор зелий DnD</h1>
            <p>Создавайте уникальные зелья для ваших приключений</p>
        </div>

        <div class="controls">
            <div class="form-grid">
                <div class="form-group">
                    <label for="potion-count">Количество зелий</label>
                    <input type="number" id="potion-count" min="1" max="20" value="5" placeholder="От 1 до 20">
                </div>

                <div class="form-group">
                    <label for="potion-type">Тип зелий</label>
                    <select id="potion-type">
                        <option value="all">Все типы</option>
                        <option value="healing">Исцеляющие</option>
                        <option value="poison">Яды</option>
                        <option value="buff">Усиливающие</option>
                        <option value="utility">Утилитарные</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="potion-rarity">Редкость</label>
                    <select id="potion-rarity">
                        <option value="all">Все редкости</option>
                        <option value="Common">Обычные</option>
                        <option value="Uncommon">Необычные</option>
                        <option value="Rare">Редкие</option>
                        <option value="Very Rare">Очень редкие</option>
                        <option value="Legendary">Легендарные</option>
                    </select>
                </div>
            </div>

            <div style="text-align: center;">
                <button id="generate-potions" class="generate-btn">Сгенерировать зелья</button>
            </div>

            <div id="loading" class="loading">Загрузка...</div>
        </div>

        <div class="results">
            <h2>Результаты генерации</h2>
            <div id="potion-results">
                <p style="text-align: center; color: #666; font-style: italic;">
                    Выберите параметры и нажмите "Сгенерировать зелья"
                </p>
            </div>
        </div>
    </div>

    <script src="potion-generator.js"></script>
</body>
</html>
