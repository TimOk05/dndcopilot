<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест API зелий</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>🧪 Тест API генерации зелий</h1>
    
    <div class="test-section">
        <h3>Тест 1: Случайные зелья</h3>
        <button onclick="testRandomPotions()">Получить 3 случайных зелья</button>
        <div id="result1" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Тест 2: Зелья по типу</h3>
        <button onclick="testTypeFilter()">Получить зелья восстановления</button>
        <div id="result2" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Тест 3: Зелья по редкости</h3>
        <button onclick="testRarityFilter()">Получить редкие зелья</button>
        <div id="result3" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>Тест 4: Комбинированный фильтр</h3>
        <button onclick="testCombinedFilter()">Получить 2 редких зелья восстановления</button>
        <div id="result4" class="result"></div>
    </div>

    <script>
        async function testAPI(endpoint, params = {}) {
            try {
                const formData = new FormData();
                Object.keys(params).forEach(key => {
                    formData.append(key, params[key]);
                });

                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                return result;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        function displayResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            if (isError) {
                element.className = 'result error';
                element.innerHTML = `<strong>Ошибка:</strong> ${data}`;
            } else {
                element.className = 'result success';
                element.innerHTML = `<strong>Успех!</strong><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        async function testRandomPotions() {
            try {
                const result = await testAPI('/api/generate-potions.php', { count: 3 });
                displayResult('result1', result);
            } catch (error) {
                displayResult('result1', error.message, true);
            }
        }

        async function testTypeFilter() {
            try {
                const result = await testAPI('/api/generate-potions.php', { 
                    count: 2, 
                    type: 'Восстановление' 
                });
                displayResult('result2', result);
            } catch (error) {
                displayResult('result2', error.message, true);
            }
        }

        async function testRarityFilter() {
            try {
                const result = await testAPI('/api/generate-potions.php', { 
                    count: 2, 
                    rarity: 'Rare' 
                });
                displayResult('result3', result);
            } catch (error) {
                displayResult('result3', error.message, true);
            }
        }

        async function testCombinedFilter() {
            try {
                const result = await testAPI('/api/generate-potions.php', { 
                    count: 2, 
                    type: 'Восстановление',
                    rarity: 'Rare'
                });
                displayResult('result4', result);
            } catch (error) {
                displayResult('result4', error.message, true);
            }
        }
    </script>
</body>
</html>
