<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Copilot Mobile</title>
    <link rel="stylesheet" href="assets/css/mobile-themes.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a67c52">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="D&D Copilot">
</head>

<body>
    <!-- Заголовок -->
    <div class="header">
        <h1>D&D Copilot</h1>
        <p>Мобильная версия генератора для D&D</p>
    </div>

    <!-- Основной контейнер -->
    <div class="container">

        <!-- Генератор персонажей -->
        <div class="card">
            <h2>🎭 Генератор персонажей</h2>
            <form id="characterForm">
                <div class="form-group">
                    <label for="characterRace">Раса:</label>
                    <select id="characterRace" name="race">
                        <option value="human">Человек</option>
                        <option value="elf">Эльф</option>
                        <option value="dwarf">Дварф</option>
                        <option value="halfling">Халфлинг</option>
                        <option value="gnome">Гном</option>
                        <option value="dragonborn">Драконорожденный</option>
                        <option value="tiefling">Тифлинг</option>
                        <option value="half-elf">Полуэльф</option>
                        <option value="half-orc">Полуорк</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="characterClass">Класс:</label>
                    <select id="characterClass" name="class">
                        <option value="fighter">Воин</option>
                        <option value="wizard">Маг</option>
                        <option value="rogue">Плут</option>
                        <option value="cleric">Жрец</option>
                        <option value="ranger">Следопыт</option>
                        <option value="paladin">Паладин</option>
                        <option value="barbarian">Варвар</option>
                        <option value="bard">Бард</option>
                        <option value="druid">Друид</option>
                        <option value="monk">Монах</option>
                        <option value="sorcerer">Чародей</option>
                        <option value="warlock">Колдун</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="characterLevel">Уровень:</label>
                    <select id="characterLevel" name="level">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>


                <button type="submit" class="btn">Сгенерировать персонажа</button>
            </form>

            <div id="characterResult" class="result" style="display: none;">
                <h3>Результат генерации</h3>
                <div id="characterContent"></div>
            </div>
        </div>

        <!-- Генератор таверн -->
        <div class="card">
            <h2>🍺 Генератор таверн</h2>
            <form id="tavernForm">
                <div class="form-group">
                    <label for="tavernCount">Количество таверн:</label>
                    <select id="tavernCount" name="count">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                    </select>
                </div>


                <button type="submit" class="btn">Сгенерировать таверны</button>
            </form>

            <div id="tavernResult" class="result" style="display: none;">
                <h3>Результат генерации</h3>
                <div id="tavernContent"></div>
            </div>
        </div>

        <!-- Генератор зелий -->
        <div class="card">
            <h2>🧪 Генератор зелий</h2>
            <form id="potionForm">
                <div class="form-group">
                    <label for="potionRarity">Редкость:</label>
                    <select id="potionRarity" name="rarity">
                        <option value="">Любая</option>
                        <option value="common">Обычное</option>
                        <option value="uncommon">Необычное</option>
                        <option value="rare">Редкое</option>
                        <option value="very_rare">Очень редкое</option>
                        <option value="legendary">Легендарное</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="potionCount">Количество зелий:</label>
                    <select id="potionCount" name="count">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                    </select>
                </div>


                <button type="submit" class="btn">Сгенерировать зелья</button>
            </form>

            <div id="potionResult" class="result" style="display: none;">
                <h3>Результат генерации</h3>
                <div id="potionContent"></div>
            </div>
        </div>

        <!-- Генератор врагов -->
        <div class="card">
            <h2>⚔️ Генератор врагов</h2>
            <form id="enemyForm">
                <div class="form-group">
                    <label for="enemyThreat">Уровень угрозы:</label>
                    <select id="enemyThreat" name="threat_level">
                        <option value="easy">Легкий</option>
                        <option value="medium">Средний</option>
                        <option value="hard">Сложный</option>
                        <option value="deadly">Смертельный</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="enemyCount">Количество врагов:</label>
                    <select id="enemyCount" name="count">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="5">5</option>
                    </select>
                </div>


                <button type="submit" class="btn">Сгенерировать врагов</button>
            </form>

            <div id="enemyResult" class="result" style="display: none;">
                <h3>Результат генерации</h3>
                <div id="enemyContent"></div>
            </div>
        </div>

        <!-- AI Чат -->
        <div class="card">
            <h2>🤖 AI Чат</h2>
            <form id="chatForm">
                <div class="form-group">
                    <label for="chatQuestion">Ваш вопрос:</label>
                    <textarea id="chatQuestion" name="question" rows="3" placeholder="Задайте вопрос о D&D..."></textarea>
                </div>

                <button type="submit" class="btn">Отправить вопрос</button>
            </form>

            <div id="chatResult" class="result" style="display: none;">
                <h3>Ответ AI</h3>
                <div id="chatContent"></div>
            </div>
        </div>

    </div>

    <!-- Индикатор загрузки -->
    <div id="loading" class="loading">
        <span>Генерация...</span>
    </div>

    <!-- Скрипты -->
    <script src="assets/js/mobile-themes.js"></script>
    <script src="assets/js/mobile.js"></script>
</body>

</html>
